name: VIAGENS - Busca de Passagens

on:
  workflow_dispatch:
    inputs:
      origem:
        description: 'Cidade de origem'
        required: true
        default: 'Guarulhos'
      destino:
        description: 'Cidade de destino'
        required: true
        default: 'Gramado'
      data_ida:
        description: 'Data de ida (DD/MM/AAAA)'
        required: true
        default: '05/05/2026'
      data_volta:
        description: 'Data de volta (DD/MM/AAAA)'
        required: true
        default: '08/05/2026'
      pagina:
        description: 'Número da página de resultados'
        required: true
        default: '2'

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth
          playwright install chromium
      
      - name: Run VIAGENS agent
        run: |
          python -c "
          import asyncio
          import sys
          sys.path.insert(0, '.')
          from viagens import ViagensAgent
          
          async def buscar():
              async with ViagensAgent(use_proxy=False) as agent:
                  # Busca primeira página
                  resultado = await agent.buscar_azul(
                      '${{ github.event.inputs.origem }}',
                      '${{ github.event.inputs.destino }}',
                      '${{ github.event.inputs.data_ida }}',
                      '${{ github.event.inputs.data_volta }}'
                  )
                  
                  # Screenshot primeira página
                  await agent.screenshot('pagina1.png')
                  
                  # Navega para página solicitada
                  pagina_atual = 1
                  pagina_desejada = int('${{ github.event.inputs.pagina }}')
                  
                  while pagina_atual < pagina_desejada:
                      resultado = await agent.proxima_pagina()
                      if resultado is None:
                          print(f'Não foi possível ir para página {pagina_atual + 1}')
                          break
                      pagina_atual += 1
                  
                  # Screenshot página final
                  await agent.screenshot(f'pagina{pagina_atual}.png')
                  
                  # Salva resultado
                  with open('resultado.txt', 'w', encoding='utf-8') as f:
                      f.write(resultado)
                  
                  print(f'=== CONTEÚDO DA PÁGINA {pagina_atual} ===')
                  print(resultado[:5000])
          
          asyncio.run(buscar())
          "
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: '*.png'
      
      - name: Upload resultado
        uses: actions/upload-artifact@v4
        with:
          name: resultado
          path: resultado.txt
